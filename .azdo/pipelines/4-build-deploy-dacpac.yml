#
#------------------------------------------------------------------------------------------------------------------------------
# Pipeline 4: Build and Deploy DACPAC to Azure SQL Database
#------------------------------------------------------------------------------------------------------------------------------
# Required ADO Variable Groups:
#   Checklist.Demo         - Common deployment variables
#   Checklist.Demo.Secrets - Secrets (SQL admin, Azure client secret)
#
# Required ADO Environments: dev, qa, prod
#
# Prerequisites (Service Principal auth):
# The service principal running this pipeline must have db_owner access in Azure SQL.
# Run in the target database:
#   CREATE USER <sp-name> FROM EXTERNAL PROVIDER
#   ALTER ROLE db_owner ADD MEMBER <sp-name>
#------------------------------------------------------------------------------------------------------------------------------
name: 4-build-deploy-dacpac-$(Date:yyyyMMdd).$(Rev:r)

trigger: none

parameters:
  - name: deployEnvironment
    displayName: Target Environment
    type: string
    default: dev
    values:
      - dev
      - qa
      - prod
  - name: dacpacAction
    displayName: DACPAC Action
    type: string
    default: build-deploy
    values:
      - build-deploy
      - build-only
  - name: loginAccountType
    displayName: Login Account Type
    type: string
    default: SVC_PRINCIPAL
    values:
      - SVC_PRINCIPAL
      - LOCAL_SQL

variables:
  - template: vars/var-common.yml
  - template: vars/var-service-connections.yml
  - group: Checklist.Demo
  - group: Checklist.Demo.Secrets

pool:
  vmImage: 'windows-latest'

stages:
  - template: stages/dacpac-deploy-stages.yml
    parameters:
      environments:
        - envCode: ${{ parameters.deployEnvironment }}
          envName: ${{ upper(parameters.deployEnvironment) }}
      azureServiceConnection: $(azureServiceConnection)
      appFolderName: $(sqlAppFolderName)
      appSolutionName: $(sqlAppSolutionName)
      appProjectName: $(sqlAppProjectName)
      loginAccountType: ${{ parameters.loginAccountType }}
      buildConfiguration: $(buildConfiguration)
      buildPlatform: $(buildPlatform)
