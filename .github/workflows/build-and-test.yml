name: Build and Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Install Aspire workload
        run: dotnet workload install aspire

      - name: Restore dependencies
        run: dotnet restore checklist-hve-core.sln

      - name: Build
        run: dotnet build checklist-hve-core.sln --no-restore --configuration Release

      - name: Test
        run: dotnet test checklist-hve-core.sln --no-build --configuration Release --logger trx --results-directory ./TestResults

      - name: Publish test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: ./TestResults
