trigger: none

resources:
  pipelines:
    - pipeline: CIBuild
      source: 'build-and-test'
      trigger: true

parameters:
  - name: environment
    type: string
    default: dev

stages:
  - stage: DeployInfra
    displayName: Deploy Infrastructure
    jobs:
      - job: BicepDeploy
        displayName: Deploy Bicep
        steps:
          - checkout: self
          - task: AzureCLI@2
            displayName: Deploy Bicep infrastructure
            inputs:
              azureSubscription: $(AZURE_SERVICE_CONNECTION)
              scriptType: bash
              scriptLocation: inlineScript
              inlineScript: |
                az deployment group create \
                  --resource-group $(AZURE_RESOURCE_GROUP) \
                  --template-file infra/bicep/main.bicep \
                  --parameters environmentName=${{ parameters.environment }} appName=checklist

  - stage: DeploySchema
    dependsOn: DeployInfra
    displayName: Deploy Schema and Migrations
    jobs:
      - job: DeployMigrations
        displayName: Run EF migrations
        steps:
          - task: DownloadBuildArtifacts@1
            displayName: Download EF migrations artifact
            inputs:
              buildType: specific
              project: $(System.TeamProjectId)
              pipeline: CIBuild
              artifactName: efmigrations
              downloadPath: $(System.ArtifactsDirectory)
          - script: |
              chmod +x $(System.ArtifactsDirectory)/efmigrations/efbundle
              $(System.ArtifactsDirectory)/efmigrations/efbundle --connection "$(AZURE_SQL_CONNECTION_STRING)"
            displayName: Run EF migrations (Identity tables)

  - stage: DeployApp
    dependsOn: DeploySchema
    displayName: Deploy Application
    jobs:
      - deployment: AppDeploy
        displayName: Deploy API App Service
        environment: ${{ parameters.environment }}
        strategy:
          runOnce:
            deploy:
              steps:
                - checkout: self
                - task: UseDotNet@2
                  inputs:
                    version: '9.0.x'
                - script: dotnet workload install aspire
                  displayName: Install Aspire workload
                - task: DotNetCoreCLI@2
                  displayName: Publish API
                  inputs:
                    command: publish
                    publishWebProjects: false
                    projects: 'src/CheckList.Api/CheckList.Api.csproj'
                    arguments: '-c Release -o $(Build.ArtifactStagingDirectory)/api'
                - task: AzureWebApp@1
                  displayName: Deploy to App Service
                  inputs:
                    azureSubscription: $(AZURE_SERVICE_CONNECTION)
                    appName: $(AZURE_APP_NAME)
                    package: '$(Build.ArtifactStagingDirectory)/api'
